# Server
server.port=8080
spring.application.name=venue

# PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/venue_db
spring.datasource.username=venue_user
spring.datasource.password=venue_pass
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.defer-datasource-initialization=true

# Redis
spring.data.redis.host=localhost
spring.data.redis.port=6379

# JWT
jwt.secret=venue-super-secret-key-must-be-at-least-64-characters-long-for-hs512-algo
jwt.expiration=86400000

# BCrypt
bcrypt.cost=12
