server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: venue
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:venuedb}
    username: ${POSTGRES_USER:venueuser}
    password: ${POSTGRES_PASSWORD:venuepass}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:86400000}

bcrypt:
  cost: ${BCRYPT_COST:12}

csv:
  validDegrees:
    - BTECH
    - BCA
    - MTECH
    - MCA
    - MSC
  student:
    columns:
      name: "Name"
      regNo: "Regdno"
      email: "Emailid"
      degree: "Degree"
      contactNo: "Contactno"
      passoutYear: "Passoutyear"
  room:
    columns:
      roomName: "RoomName"
      capacity: "Capacity"
      building: "Building"
      floor: "Floor"
      day: "Day"
      seatsPerRow: "SeatsPerRow"

app:
  qr-secret: ${QR_SECRET}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}

admin:
  default:
    username: ${ADMIN_DEFAULT_USERNAME:admin}
    password: ${ADMIN_DEFAULT_PASSWORD:admin123}
  full:
    name: ${ADMIN_FULL_NAME:System Administrator}

rate:
  limit:
    max-attempts: ${RATE_LIMIT_MAX_ATTEMPTS:10}
    window-ms: ${RATE_LIMIT_WINDOW_MS:60000}

qr:
  code:
    size: ${QR_CODE_SIZE:300}
