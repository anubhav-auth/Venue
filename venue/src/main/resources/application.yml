server:
  port: ${SERVER_PORT:8080}
  compression:
    enabled: true
    mime-types: application/json,text/html,text/css,application/javascript,text/javascript
    min-response-size: 1024
  tomcat:
    accept-count: 1000
    max-connections: 10000
    connection-timeout: 20000

spring:
  application:
    name: venue
  threads:
    virtual:
      enabled: true
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:venuedb}
    username: ${POSTGRES_USER:venueuser}
    password: ${POSTGRES_PASSWORD:venuepass}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 25
      minimum-idle: 5
      connection-timeout: 20000
      idle-timeout: 300000
      max-lifetime: 1200000
      pool-name: VenueHikariPool
      leak-detection-threshold: 60000
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          batch_size: 100
        order_inserts: true
        order_updates: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:86400000}

bcrypt:
  cost: ${BCRYPT_COST:8}

csv:
  validBranches:
    - Computer Science & Engineering
    - Computer Science and Information Technology
    - Computer Science & Engineering (IOT)
    - Master in Computer Application (MCA)
    - Electronics & Communication Engineering
    - Computer Science & Engineering (Data Science)
    - Computer Science & Engineering (AIML)
    - Computer Science & Engineering (Cyber Security)
    - Mechanical Engineering
    - Electrical and Electronics Engineering
    - Electrical Engineering
    - Civil Engineering
    - Others
  student:
    columns:
      name: "Full Name"
      regNo: "Regd. No"
      branch: "BRANCH"
  room:
    columns:
      roomName: "RoomName"
      capacity: "Capacity"
      building: "Building"
      floor: "Floor"
      day: "Day"
      seatsPerRow: "SeatsPerRow"

app:
  qr-secret: ${QR_SECRET}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}

admin:
  default:
    username: ${ADMIN_DEFAULT_USERNAME:admin}
    password: ${ADMIN_DEFAULT_PASSWORD:admin123}
  full:
    name: ${ADMIN_FULL_NAME:System Administrator}

rate:
  limit:
    max-attempts: ${RATE_LIMIT_MAX_ATTEMPTS:10}
    window-ms: ${RATE_LIMIT_WINDOW_MS:60000}

qr:
  code:
    size: ${QR_CODE_SIZE:300}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized
