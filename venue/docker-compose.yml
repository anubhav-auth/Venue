services:

  postgres:
    image: postgres:16-alpine
    container_name: venue_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-venuedb}
      POSTGRES_USER:     ${POSTGRES_USER:-venue}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - /mnt/disks/postgres-data:/var/lib/postgresql/data
    command: >
      postgres
      -c shared_buffers=2GB
      -c effective_cache_size=6GB
      -c work_mem=8MB
      -c maintenance_work_mem=256MB
      -c max_connections=150
      -c wal_buffers=64MB
      -c synchronous_commit=off
      -c checkpoint_completion_target=0.9
      -c random_page_cost=1.1
      -c effective_io_concurrency=200
      -c max_worker_processes=4
      -c max_parallel_workers=4
    networks:
      - internal
    deploy:
      resources:
        limits:
          memory: 2.5g
          cpus: '1.0'
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-venue} -d ${POSTGRES_DB:-venuedb}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: venue_redis
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - internal

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: venue_app
    restart: unless-stopped
    environment:
      JAVA_OPTS: >-
        -XX:+UseContainerSupport
        -XX:MaxRAMPercentage=55.0
        -XX:InitialRAMPercentage=30.0
        -XX:+UseG1GC
        -XX:MaxGCPauseMillis=200
        -XX:G1HeapRegionSize=16m
        -Djdk.tracePinnedThreads=short
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL:      jdbc:postgresql://postgres:5432/${POSTGRES_DB:-venuedb}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-venue}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_DATA_REDIS_HOST:     redis
      SPRING_DATA_REDIS_PORT:     6379
      JWT_SECRET:                 ${JWT_SECRET}
      JWT_EXPIRATION:             ${JWT_EXPIRATION:-86400000}
      QR_SECRET:                  ${QR_SECRET}
      BCRYPT_COST:                ${BCRYPT_COST:-12}
      CORS_ALLOWED_ORIGINS:       ${CORS_ALLOWED_ORIGINS}
      ADMIN_DEFAULT_USERNAME:     ${ADMIN_DEFAULT_USERNAME:-admin}
      ADMIN_DEFAULT_PASSWORD:     ${ADMIN_DEFAULT_PASSWORD}
      RATE_LIMIT_MAX_ATTEMPTS:    ${RATE_LIMIT_MAX_ATTEMPTS:-10}
      RATE_LIMIT_WINDOW_MS:       ${RATE_LIMIT_WINDOW_MS:-60000}
    ports:
      - "${SERVER_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal
    deploy:
      resources:
        limits:
          memory: 3g
          cpus: '2.5'
        reservations:
          memory: 1.5g
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s

volumes:
  redis_data:

# NOTE: postgres-data is on a host bind mount (/mnt/disks/postgres-data)
# NOTE: Caddy runs on the HOST VM directly — NOT in Docker

networks:
  internal:
    driver: bridge
