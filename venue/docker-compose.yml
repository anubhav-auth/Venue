services:

  postgres:
    image: postgres:16-alpine
    container_name: venue_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-venuedb}
      POSTGRES_USER:     ${POSTGRES_USER:-venueuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-venuepass}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-venueuser} -d ${POSTGRES_DB:-venuedb}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - venue_net

  redis:
    image: redis:7-alpine
    container_name: venue_redis
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - venue_net

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: venue_app
    restart: unless-stopped
    profiles: ["prod"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL:      jdbc:postgresql://postgres:5432/${POSTGRES_DB:-venuedb}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-venueuser}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_DATA_REDIS_HOST:     redis
      SPRING_DATA_REDIS_PORT:     6379
      JWT_SECRET:                 ${JWT_SECRET}
      JWT_EXPIRATION:             ${JWT_EXPIRATION:-86400000}
      QR_SECRET:                  ${QR_SECRET}
      BCRYPT_COST:                ${BCRYPT_COST:-12}
      CORS_ALLOWED_ORIGINS:       ${CORS_ALLOWED_ORIGINS}
      ADMIN_DEFAULT_USERNAME:     ${ADMIN_DEFAULT_USERNAME:-admin}
      ADMIN_DEFAULT_PASSWORD:     ${ADMIN_DEFAULT_PASSWORD}
      RATE_LIMIT_MAX_ATTEMPTS:    ${RATE_LIMIT_MAX_ATTEMPTS:-10}
      RATE_LIMIT_WINDOW_MS:       ${RATE_LIMIT_WINDOW_MS:-60000}
    ports:
      - "${SERVER_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - venue_net

volumes:
  postgres_data:
  redis_data:

networks:
  venue_net:
    driver: bridge
