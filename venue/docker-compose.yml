services:
  postgres:
    image: postgres:16-alpine
    container_name: venue_postgres
    environment:
      POSTGRES_DB: venue_db
      POSTGRES_USER: venue_user
      POSTGRES_PASSWORD: venue_pass
    ports:
      - "5432:5432"
    volumes:
      - venue_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U venue_user -d venue_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: venue_redis
    ports:
      - "6379:6379"
    volumes:
      - venue_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  venue_postgres_data:
  venue_redis_data:
